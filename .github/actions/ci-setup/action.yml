name: 'CI setup'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.x
        cache: yarn

    - name: Install Dependencies
      run: yarn --immutable
      shell: bash
